<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div id="mode-screen" class="active">
    <h1>Card Game</h1>
    <p class="subtitle">Race to empty your hand — but don't win a trick!</p>
    <div class="mode-buttons">
      <button class="mode-btn primary" onclick="window.location.href='/lobby'">
        🌐 Play Online
        <span class="mode-sub">Play with friends anywhere</span>
      </button>
      <button class="mode-btn" onclick="window.location.href='/setup'">
        🖥️ Play Locally
        <span class="mode-sub">Same device or pass-and-play</span>
      </button>
      <button class="mode-btn" onclick="window.location.href='/how-to-play'">
        📖 How to Play
        <span class="mode-sub">Rules and strategy tips</span>
      </button>
    </div>
  </div>

</body>
</html>
